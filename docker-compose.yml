services:
  python-service:
    build: ./python-service
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    develop:
      watch:
        - action: sync+restart
          path: ./python-service
          target: /app
          ignore:
            - __pycache__/
            - uploads/
            - .pytest_cache/
        - action: rebuild
          path: ./python-service/requirements.txt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PYTHON_SERVICE_URL=http://python-service:8000
      - GATEWAY_PORT=4000
    depends_on:
      - python-service
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/package.json

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/next.config.ts

volumes:
  uploads:
